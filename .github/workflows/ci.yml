name: ci

on:
  push:
  pull_request:

env:
  STAGE0_TAG: v0.6.6

jobs:
  # ── Stage0 Governance (THE JUDGE) ──────────────────────────────
  # Frozen, trusted toolkit runs its gates on the PR code.
  # This job is the merge-blocking authority.
  stage0-governance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone Stage0 toolkit
        run: |
          git clone --branch ${{ env.STAGE0_TAG }} --depth 1 \
            https://github.com/svapre/control-loop-kit.git /tmp/stage0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Stage0 dependencies
        run: python -m pip install -r /tmp/stage0/requirements-dev.txt

      # NOTE: Run individual Stage0 gates explicitly because v0.6.6 pre-dates
      # run_gate_suite.py. When Stage0 is promoted to >=v0.7.0, replace these
      # with: cd /tmp/stage0 && python scripts/run_gate_suite.py --suite stage0
      - name: "Stage0: Prompt Sync"
        run: python /tmp/stage0/scripts/generate_model_catalog_prompt.py --check

      - name: "Stage0: Backlog Contract"
        run: python /tmp/stage0/scripts/validate_backlog.py --check

      - name: "Stage0: Dashboard Sync"
        run: python /tmp/stage0/scripts/render_dashboard.py --check

      - name: "Stage0: Lint"
        run: python -m ruff check .

      - name: "Stage0: Tests"
        run: python -m pytest -q

  # ── State Government (TOOLKIT SELF-GOVERNANCE) ──────────────────
  # The toolkit's own CI enforces BOTH national laws (from default_policy.json)
  # and its state laws (.control-loop/policy.json) on every PR.
  # This makes the toolkit a proper consumer of its own governance.
  # control_gate: strict (static artifact checks must pass)
  # process_guard: advisory (reports violations, doesn't block yet —
  #   bootstrap period while session/proposal docs are established)
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Generated Prompt Sync
        run: python scripts/generate_model_catalog_prompt.py --check

      - name: Backlog Contract Check
        run: python scripts/validate_backlog.py --check

      - name: Setpoint Metric Sync Check
        run: python scripts/sync_setpoints.py --check

      - name: Dashboard Sync Check
        run: python scripts/render_dashboard.py --check

      - name: Onboarding Docs Contract Check
        run: python scripts/validate_onboarding_docs.py --check

      - name: Release Hygiene Check
        run: python scripts/validate_release_hygiene.py --check --allow-unreleased-latest

      - name: Control-Loop Integrity Check
        run: python scripts/verify_control_loop.py --check

      - name: Control Gate (state government — artifact compliance)
        run: python -m control_loop.control_gate --mode ci

      - name: Process Guard (state government — process compliance, advisory)
        # Advisory mode: reports violations without blocking.
        # Switch to strict (remove `|| true`) once session/proposal docs
        # are bootstrapped for the toolkit's own changes.
        run: python -m control_loop.process_guard --mode ci --base-sha ${{ github.event.pull_request.base.sha || 'HEAD~1' }} || true

      - name: Lint
        run: python -m ruff check .

      - name: Test
        run: python -m pytest -q


